<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📑 Gestor de actividades</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-database-compat.js"></script>

    <style>
        :root {
            --bg-body: #f0f4f8;
            --bg-card: #ffffff;
            --primary: #4dabf7;
            --pending: #ff922b;
            --success: #51cf66;
            --danger: #ff6b6b;
            --text-main: #212529;
            --text-muted: #868e96;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-body);
            display: flex;
            justify-content: center;
            padding: 30px 15px;
        }

        .container {
            width: 100%;
            max-width: 580px;
            background: var(--bg-card);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
        }

        .stats-panel {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 25px;
        }

        .stat-card {
            text-align: center;
            padding: 12px;
            border-radius: 15px;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
        }

        .stat-card span { font-size: 0.65rem; font-weight: 800; text-transform: uppercase; color: var(--text-muted); display: block; }
        .stat-card b { font-size: 1.4rem; color: var(--text-main); }
        .stat-total { border-bottom: 4px solid var(--primary); }
        .stat-pending { border-bottom: 4px solid var(--pending); }
        .stat-completed { border-bottom: 4px solid var(--success); }

        h2 { text-align: center; font-weight: 800; text-transform: uppercase; color: var(--primary); margin-bottom: 20px; letter-spacing: 1px; font-size: 1.2rem; }

        .input-group { display: flex; flex-direction: column; gap: 10px; margin-bottom: 25px; }

        input {
            width: 100%;
            padding: 14px;
            border: 2px solid #dee2e6;
            border-radius: 12px;
            font-size: 0.95rem;
            text-transform: uppercase;
            outline: none;
            font-weight: 600;
        }

        input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(77, 171, 247, 0.1); }

        .btn-add {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-weight: 800;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.2s;
        }

        /* Nuevo botón Limpiar */
        .btn-clear {
            background-color: transparent;
            color: var(--danger);
            border: 2px solid var(--danger);
            padding: 10px;
            border-radius: 12px;
            font-weight: 800;
            text-transform: uppercase;
            cursor: pointer;
            font-size: 0.75rem;
            transition: 0.2s;
        }

        .btn-clear:hover { background-color: var(--danger); color: white; }

        .filters { display: flex; gap: 5px; margin-bottom: 15px; background: #f1f3f5; padding: 4px; border-radius: 10px; }
        .filters button {
            flex: 1; padding: 10px; border: none; background: transparent; color: var(--text-muted);
            cursor: pointer; font-weight: 700; text-transform: uppercase; font-size: 0.65rem; border-radius: 8px;
        }
        .filters button.active { background: white; color: var(--primary); box-shadow: 0 2px 5px rgba(0,0,0,0.05); }

        .task-list { list-style: none; }
        .task-item {
            background: #fff; margin-bottom: 10px; padding: 15px; border-radius: 15px; border: 1px solid #f1f3f5;
            display: flex; justify-content: space-between; align-items: center; gap: 10px;
        }
        .task-item.is-completed { border-left: 8px solid var(--success); }
        .task-item.is-pending { border-left: 8px solid var(--pending); }

        .task-info { flex-grow: 1; text-transform: uppercase; }
        .task-time { font-size: 0.65rem; color: var(--text-muted); display: block; margin-bottom: 2px; font-weight: 700; }
        .task-info b { font-size: 0.9rem; display: block; }
        .task-info .desc { font-size: 0.8rem; color: #495057; }

        .actions { display: flex; gap: 8px; align-items: center; }
        .status-btn {
            border: none; padding: 8px 12px; border-radius: 10px; cursor: pointer;
            font-size: 0.65rem; font-weight: 900; text-transform: uppercase; color: white; min-width: 95px;
        }
        .btn-pending { background-color: var(--pending); }
        .btn-completed { background-color: var(--success); }
        .btn-delete { background: none; color: #ced4da; border: none; cursor: pointer; }
        .btn-delete:hover { color: var(--danger); }
    </style>
</head>
<body>

<div class="container">
    <div class="stats-panel">
        <div class="stat-card stat-total">
            <span>Todas</span>
            <b id="count-all">0</b>
        </div>
        <div class="stat-card stat-pending">
            <span>Pendientes</span>
            <b id="count-pending">0</b>
        </div>
        <div class="stat-card stat-completed">
            <span>Completas</span>
            <b id="count-completed">0</b>
        </div>
    </div>

    <h2>🗒️ REGISTROS DE TAREAS</h2>
    
    <div class="input-group">
        <input type="text" id="userName" placeholder="Nombre del Responsable" autocomplete="off" onkeydown="handleEnter(event, 'taskDesc')">
        <input type="text" id="taskDesc" placeholder="¿Qué actividad se realizará?" autocomplete="off" onkeydown="handleEnter(event, 'btnSubmit')">
        <button id="btnSubmit" class="btn-add" onclick="addTask()">Registrar</button>
        <button class="btn-clear" onclick="clearAllData()">Limpiar Todos los Registros</button>
    </div>

    <div class="filters">
        <button onclick="changeFilter('all')" class="active" id="btn-all">Todas</button>
        <button onclick="changeFilter('pending')" id="btn-pending-filter">Pendientes</button>
        <button onclick="changeFilter('completed')" id="btn-completed-filter">Completas</button>
    </div>

    <ul id="taskList" class="task-list"></ul>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyClp2tVcoeIE_ZOedIzP6zyEXEoP9Em0tM",
        authDomain: "chatpareja-3fbce.firebaseapp.com",
        databaseURL: "https://chatpareja-3fbce-default-rtdb.firebaseio.com",
        projectId: "chatpareja-3fbce",
        storageBucket: "chatpareja-3fbce.firebasestorage.app",
        messagingSenderId: "954583350974",
        appId: "1:954583350974:web:40721baafd37214cd728ef"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const tasksRef = db.ref('actividades');

    let currentFilter = 'all';

    function handleEnter(event, nextId) {
        if (event.key === "Enter") {
            event.preventDefault();
            if (nextId === 'btnSubmit') addTask();
            else document.getElementById(nextId).focus();
        }
    }

    function addTask() {
        const nameInput = document.getElementById('userName');
        const descInput = document.getElementById('taskDesc');
        const name = nameInput.value.trim().toUpperCase();
        const desc = descInput.value.trim().toUpperCase();

        if (name === '' || desc === '') return;

        const ahora = new Date();
        const fechaHora = ahora.toLocaleDateString() + ' ' + ahora.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});

        tasksRef.push({
            name: name, desc: desc, time: fechaHora, completed: false,
            createdAt: firebase.database.ServerValue.TIMESTAMP
        });

        nameInput.value = ''; descInput.value = ''; nameInput.focus();
    }

    // FUNCIÓN PARA LIMPIAR TODO EL FIREBASE
    function clearAllData() {
        const confirm1 = confirm("¿ESTÁS SEGURO? ESTO ELIMINARÁ TODA LA LISTA PARA TODAS LAS COMPUTADORAS.");
        if (confirm1) {
            const confirm2 = confirm("ESTA ACCIÓN NO SE PUEDE DESHACER. ¿VACIAR TODO AHORA?");
            if (confirm2) {
                tasksRef.remove()
                    .then(() => alert("Base de datos limpiada con éxito."))
                    .catch((error) => console.error("Error al limpiar:", error));
            }
        }
    }

    tasksRef.on('value', (snapshot) => {
        const data = snapshot.val();
        updateStats(data);
        renderTasks(data);
    });

    function updateStats(data) {
        const countAll = document.getElementById('count-all');
        const countPending = document.getElementById('count-pending');
        const countCompleted = document.getElementById('count-completed');

        if (!data) {
            countAll.innerText = '0';
            countPending.innerText = '0';
            countCompleted.innerText = '0';
            return;
        }
        const tasks = Object.values(data);
        countAll.innerText = tasks.length;
        countPending.innerText = tasks.filter(t => !t.completed).length;
        countCompleted.innerText = tasks.filter(t => t.completed).length;
    }

    function toggleTask(id, currentStatus) { tasksRef.child(id).update({ completed: !currentStatus }); }
    function deleteTask(id) { if(confirm("¿ELIMINAR ESTA ACTIVIDAD?")) tasksRef.child(id).remove(); }
    function changeFilter(filter) { currentFilter = filter; tasksRef.once('value', (snapshot) => renderTasks(snapshot.val())); }

    function renderTasks(data) {
        const list = document.getElementById('taskList');
        list.innerHTML = '';
        if (!data) return;

        let tasksArray = Object.keys(data).map(key => ({ id: key, ...data[key] }));
        tasksArray.sort((a, b) => b.createdAt - a.createdAt);

        if (currentFilter === 'pending') tasksArray = tasksArray.filter(t => !t.completed);
        if (currentFilter === 'completed') tasksArray = tasksArray.filter(t => t.completed);

        tasksArray.forEach(t => {
            const li = document.createElement('li');
            li.className = `task-item ${t.completed ? 'is-completed' : 'is-pending'}`;
            li.innerHTML = `
                <div class="task-info">
                    <span class="task-time">${t.time}</span>
                    <b>${t.name}</b>
                    <span class="desc">${t.desc}</span>
                </div>
                <div class="actions">
                    <button class="status-btn ${t.completed ? 'btn-completed' : 'btn-pending'}" onclick="toggleTask('${t.id}', ${t.completed})">
                        ${t.completed ? 'COMPLETO' : 'PENDIENTE'}
                    </button>
                    <button class="btn-delete" onclick="deleteTask('${t.id}')">
                        <span class="material-icons">delete_outline</span>
                    </button>
                </div>
            `;
            list.appendChild(li);
        });

        document.querySelectorAll('.filters button').forEach(b => b.classList.remove('active'));
        const activeBtnId = currentFilter === 'all' ? 'btn-all' : (currentFilter === 'pending' ? 'btn-pending-filter' : 'btn-completed-filter');
        document.getElementById(activeBtnId).classList.add('active');
    }
</script>

</body>
</html>
